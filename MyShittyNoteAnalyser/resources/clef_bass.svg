<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 120" width="60" height="120">
  <!-- Bass (F) clef — simplified path for dark UI -->
  <g fill="none" stroke="#cccccc" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main curve (backwards C shape) -->
    <path d="
      M 36 18
      C 20 18, 10 30, 10 44
      C 10 56, 18 66, 28 72
      C 36 78, 38 84, 34 88
      C 30 92, 24 90, 22 86
    "/>
    <!-- Top curl -->
    <path d="
      M 10 44
      C 14 30, 20 20, 36 18
    "/>
    <!-- Bottom curve -->
    <path d="
      M 22 86
      C 24 90, 28 94, 34 94
      C 40 94, 42 90, 38 88
    "/>
  </g>
  <!-- Two dots to the right of the curve (F clef signature) -->
  <circle cx="48" cy="36" r="3.5" fill="#cccccc" stroke="none"/>
  <circle cx="48" cy="52" r="3.5" fill="#cccccc" stroke="none"/>
  <!-- Ledger line (middle C) -->
  <line x1="50" y1="82" x2="10" y2="82" stroke="#cccccc" stroke-width="1"/>
</svg>
