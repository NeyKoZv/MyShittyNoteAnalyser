<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 120" width="60" height="120">
  <!-- Treble (G) clef — simplified path for dark UI -->
  <g fill="none" stroke="#cccccc" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main spiral body -->
    <path d="
      M 38 100
      C 42 100, 46 96, 46 92
      C 46 87, 42 84, 37 82
      C 32 80, 28 76, 26 72
      C 22 62, 22 48, 26 38
      C 28 32, 32 28, 36 27
      C 40 26, 44 30, 44 35
      C 44 40, 40 42, 36 41
      C 33 40, 31 38, 30 36
      C 29 34, 29 33, 30 32
    "/>
    <!-- Descending curl -->
    <path d="
      M 30 32
      C 14 34, 6 48, 8 62
      C 9 68, 10 74, 12 80
      C 14 86, 16 92, 16 98
      C 16 104, 14 108, 10 110
      C 6 112, 4 108, 6 104
    "/>
    <!-- Top curl -->
    <path d="
      M 30 32
      C 32 28, 36 18, 32 12
      C 30 10, 28 10, 28 12
      C 28 14, 30 16, 30 18
    "/>
    <!-- Bottom dot -->
    <circle cx="8" cy="112" r="3.5" fill="#cccccc" stroke="none"/>
  </g>
  <!-- Ledger line -->
  <line x1="50" y1="92" x2="10" y2="92" stroke="#cccccc" stroke-width="1"/>
</svg>
